<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FastAPI Auth Pack</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f8fafc; color: #0f172a; }
    header { position: sticky; top: 0; z-index: 30; background: #111827; color: white; padding: 1rem 1.25rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; box-shadow: 0 10px 30px rgba(15,23,42,.18); }
    header h1 { margin: 0; font-size: 1.25rem; white-space: nowrap; }
    main { max-width: 920px; margin: 1.5rem auto 2rem; padding: 0 1rem; display: grid; gap: 1rem; }
    section { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 1rem; box-shadow: 0 8px 20px rgba(15,23,42,.05); }
    label { display: block; margin: .7rem 0 .25rem; font-weight: 700; }
    input, select, button { font: inherit; padding: .65rem .75rem; border-radius: 9px; border: 1px solid #cbd5e1; }
    button { border: 0; background: #2563eb; color: white; font-weight: 800; cursor: pointer; margin: .25rem .25rem .25rem 0; }
    button.secondary { background: #475569; }
    button.danger { background: #dc2626; }
    .header-nav { flex: 1 1 360px; position: relative; }
    .nav-primary { display: flex; gap: .5rem; flex-wrap: wrap; }
    .nav-root-btn { min-width: 120px; padding: .8rem 1rem; border: 1px solid rgba(255,255,255,.18); box-shadow: 0 8px 20px rgba(0,0,0,.16); }
    .nav-root-btn.active { outline: 3px solid rgba(147,197,253,.55); background: #1d4ed8; }
    .nav-subpanel { position: absolute; top: calc(100% + .75rem); left: 0; width: min(680px, calc(100vw - 2.5rem)); background: white; color: #0f172a; border: 1px solid #dbe4ef; border-radius: 14px; box-shadow: 0 24px 70px rgba(15,23,42,.28); padding: .75rem; }
    .nav-menu { display: none; gap: .6rem; grid-template-columns: minmax(170px, 220px) minmax(230px, 1fr); align-items: start; }
    .nav-menu.active { display: grid; }
    .nav-menu-title { grid-column: 1 / -1; margin: .2rem .25rem 0; color: #334155; font-size: .8rem; font-weight: 800; letter-spacing: .04em; text-transform: uppercase; }
    .nav-level { grid-column: 1; position: relative; border: 1px solid #e2e8f0; border-radius: 12px; background: #f8fafc; overflow: visible; }
    .nav-level summary { cursor: pointer; padding: .75rem .9rem; font-weight: 800; list-style: none; display: flex; justify-content: space-between; border-radius: 12px; }
    .nav-level[open] summary { background: #eff6ff; color: #1d4ed8; }
    .nav-level summary::-webkit-details-marker { display: none; }
    .nav-level summary::before { content: "▸"; color: #2563eb; margin-right: .25rem; transition: transform .16s ease; }
    .nav-level[open] summary::before { transform: none; }
    .nav-level summary::after { content: "展開"; color: #64748b; font-size: .8rem; margin-left: auto; }
    .nav-level[open] summary::after { content: "右側"; }
    .nav-level[open]::after { content: ""; position: absolute; top: 0; left: 100%; width: .6rem; height: 100%; }
    .nav-actions { position: absolute; top: 0; left: calc(100% + .6rem); width: min(420px, calc(100vw - 320px)); min-width: 230px; display: flex; flex-direction: column; gap: .45rem; flex-wrap: nowrap; padding: .65rem; background: white; border: 1px solid #dbe4ef; border-radius: 12px; box-shadow: 0 16px 42px rgba(15,23,42,.16); z-index: 2; }
    .nav-level:not([open]) .nav-actions { display: none; }
    .nav-actions button { margin: 0; }
    @media (max-width: 720px) {
      .nav-menu { grid-template-columns: 1fr; }
      .nav-menu-title, .nav-level { grid-column: 1; }
      .nav-level[open]::after { display: none; }
      .nav-actions { position: static; width: auto; min-width: 0; margin: 0 .65rem .65rem; box-shadow: none; }
      .nav-level[open] summary::before { transform: rotate(90deg); }
      .nav-level[open] summary::after { content: "收合"; }
    }
    pre { white-space: pre-wrap; background: #0f172a; color: #e2e8f0; padding: 1rem; border-radius: 10px; }
    .hidden { display: none !important; }
    .copy-modal { position: fixed; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center; padding: 20px; background: rgba(15,23,42,.55); }
    .copy-dialog { width: min(720px, 100%); background: white; border-radius: 14px; box-shadow: 0 24px 60px rgba(15,23,42,.28); padding: 18px; }
    .copy-dialog textarea { min-height: 130px; width: 100%; box-sizing: border-box; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; word-break: break-all; }
    .copy-actions { display:flex; gap:10px; justify-content:flex-end; flex-wrap:wrap; margin-top:10px; }
    .row { display: flex; gap: .75rem; flex-wrap: wrap; align-items: end; }
    .row > div { flex: 1 1 180px; }
    .muted { color: #64748b; font-size: .9rem; }
    .audit, .user { border: 1px solid #e5e7eb; border-radius: 10px; padding: .75rem; margin: .5rem 0; background: #fbfdff; }
    .pager { display:flex; gap:.5rem; align-items:center; justify-content:flex-end; flex-wrap:wrap; margin:.75rem 0; }
    .pager button { padding:.45rem .7rem; }
    .pager input { width: 5.5rem; padding: .45rem .55rem; }
    .pager .pager-jump { display: inline-flex; gap: .35rem; align-items: center; }
    .sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }
  </style>
</head>
<body>
<header>
  <h1>FastAPI Auth Pack</h1>
  <nav id="authPackNav" class="header-nav" aria-label="Auth Pack 功能導航">
    <div class="nav-primary" role="menubar" aria-label="第一層功能區">
      <button class="nav-root-btn" type="button" data-nav-root="identity" aria-expanded="false">登入身分</button>
      <button class="nav-root-btn secondary" type="button" data-nav-root="password" aria-expanded="false">密碼補救</button>
      <button class="nav-root-btn secondary" type="button" data-nav-root="admin" aria-expanded="false">帳號審核</button>
    </div>
    <div id="navSubPanel" class="nav-subpanel hidden" aria-label="第二層功能選單">
      <div class="nav-menu" data-nav-menu="identity">
        <p class="nav-menu-title">登入 / 註冊</p>
        <details class="nav-level" open><summary>身分操作</summary><div class="nav-actions"><button type="button" onclick="jumpToSection('identitySection')">登入表單</button><button class="secondary" type="button" onclick="me(); collapseAuthPackNav();">我是誰</button></div></details>
      </div>
      <div class="nav-menu" data-nav-menu="password">
        <p class="nav-menu-title">密碼管理</p>
        <details class="nav-level" open><summary>重設與稽核</summary><div class="nav-actions"><button type="button" onclick="jumpToSection('passwordSection')">密碼管理</button><button class="secondary" type="button" onclick="loginAudit(); collapseAuthPackNav();">登入稽核</button><button class="secondary" type="button" onclick="jumpToSection('accountStatsSection')">帳號統計</button></div></details>
      </div>
      <div class="nav-menu" data-nav-menu="admin">
        <p class="nav-menu-title">Superuser</p>
        <details class="nav-level" open><summary>帳號審核</summary><div class="nav-actions"><button type="button" onclick="jumpToSection('adminSection')">審核清單</button><button class="secondary" type="button" onclick="refreshUsers(); collapseAuthPackNav();">重新整理</button></div></details>
      </div>
    </div>
  </nav>
</header>
<main>
  <section id="identitySection">
    <p>這是可直接改造的最小登入 / 註冊 / 密碼補救 / 帳號審核頁面。Token 存在 <code>localStorage.auth_token</code>。</p>
    <div class="row">
      <div><label>帳號</label><input id="username" autocomplete="username" /></div>
      <div><label>密碼</label><input id="password" type="password" autocomplete="current-password" /></div>
    </div>
    <div class="row">
      <div><label>姓名（選填）</label><input id="fullName" /></div>
      <div><label>單位（選填）</label><input id="department" /></div>
    </div>
    <label>備註（選填）</label><input id="note" />
    <button onclick="login()">登入</button>
    <button class="secondary" onclick="registerUser()">建立 pending 帳號</button>
    <button class="secondary" onclick="me()">我是誰</button>
    <button class="danger" onclick="logout()">登出並讓 token 失效</button>
  </section>
  <section id="passwordSection">
    <h2>密碼管理 / 忘記密碼補救</h2>
    <div class="row">
      <div><label>目前密碼</label><input id="currentPassword" type="password" autocomplete="current-password" /></div>
      <div><label>新密碼</label><input id="newPassword" type="password" autocomplete="new-password" /></div>
      <div><label>一次性 reset token（管理員提供）</label><input id="resetToken" /></div>
    </div>
    <button onclick="changePassword()">變更自己的密碼</button>
    <button class="secondary" onclick="forgotPassword()">忘記密碼：送出申請</button>
    <button class="secondary" onclick="recoverPassword()">用 reset token 重設密碼</button>
    <button class="secondary" onclick="loginAudit()">查詢登入稽核</button>
    <div class="pager" aria-label="登入稽核分頁"><span id="loginAuditPageInfo" class="muted">第 1 頁</span><button id="loginAuditFirstBtn" class="secondary" type="button">首頁</button><button id="loginAuditPrevBtn" class="secondary" type="button">上一頁</button><span class="pager-jump"><label class="sr-only" for="loginAuditPageInput">登入稽核頁數</label><input id="loginAuditPageInput" type="number" min="1" value="1" inputmode="numeric" /><button id="loginAuditGotoBtn" class="secondary" type="button">跳至頁數</button></span><button id="loginAuditNextBtn" class="secondary" type="button">下一頁</button><button id="loginAuditLastBtn" class="secondary" type="button">末頁</button></div>
    <div id="loginAuditHits"></div>
  </section>
  <section id="adminSection">
    <h2>Superuser 帳號審核</h2>
    <button onclick="refreshUsers()">重新整理帳號</button>
    <div class="pager" aria-label="帳號清單分頁"><span id="usersPageInfo" class="muted">第 1 頁</span><button id="usersFirstBtn" class="secondary" type="button">首頁</button><button id="usersPrevBtn" class="secondary" type="button">上一頁</button><span class="pager-jump"><label class="sr-only" for="usersPageInput">帳號清單頁數</label><input id="usersPageInput" type="number" min="1" value="1" inputmode="numeric" /><button id="usersGotoBtn" class="secondary" type="button">跳至頁數</button></span><button id="usersNextBtn" class="secondary" type="button">下一頁</button><button id="usersLastBtn" class="secondary" type="button">末頁</button></div>
    <div id="users"></div>
  </section>
  <section id="accountStatsSection">
    <h2>帳號操作統計</h2>
    <p>範例包可直接呼叫共用 audit chart module，篩選 auth.* 帳號操作並繪製統計曲線。</p>
    <div class="row">
      <div><label>帳號</label><input id="accountStatsUsername" placeholder="留空代表全部（需 superuser）" /></div>
      <div><label>動作包含</label><input id="accountStatsAction" placeholder="例如 password 或 login" /></div>
      <div><label>曲線區間</label><select id="accountStatsBucket"><option value="hour">每小時</option><option value="6_hours">每 6 小時</option><option value="12_hours">每 12 小時</option><option value="day" selected>每日</option><option value="week">每週</option><option value="month">每月</option></select></div>
    </div>
    <button onclick="loadAccountStats()">查詢帳號操作統計</button>
    <div id="accountStatsCards" class="stat-cards"></div>
    <div class="chart-card">
      <strong id="accountStatsTitle">帳號操作統計曲線</strong>
      <div id="accountStatsSummary"></div>
      <div id="accountStatsChart" class="chart-empty">尚未載入圖表</div>
    </div>
  </section>
  <section id="resetTokenModal" class="copy-modal hidden" role="dialog" aria-modal="true" aria-labelledby="resetTokenModalTitle">
    <div class="copy-dialog">
      <h2 id="resetTokenModalTitle">一次性 reset token</h2>
      <p id="resetTokenModalHelp"></p>
      <textarea id="resetTokenModalValue" readonly></textarea>
      <p id="resetTokenCopyStatus"></p>
      <div class="copy-actions">
        <button id="copyResetTokenBtn">複製 token</button>
        <button id="closeResetTokenModalBtn" class="secondary">關閉</button>
      </div>
    </div>
  </section>
  <section>
    <h2>輸出</h2>
    <pre id="output">尚未執行</pre>
  </section>
</main>
<script src="audit_tools.js?v=20260612-paginate"></script>
<script>
const tokenKey = 'auth_token';
const navState = { activeRoot: '' };
const pageState = { usersRows: [], usersPage: 1, usersRoleOptions: [], loginAuditRows: [], loginAuditPage: 1 };
const out = (data) => document.getElementById('output').textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
const esc = (v) => String(v ?? '').replace(/[&<>'"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));
function setActiveAuthPackNavRoot(root) {
  navState.activeRoot = root || '';
  document.querySelectorAll('[data-nav-root]').forEach(btn => {
    const active = btn.dataset.navRoot === navState.activeRoot;
    btn.classList.toggle('active', active);
    btn.setAttribute('aria-expanded', active ? 'true' : 'false');
  });
  document.querySelectorAll('[data-nav-menu]').forEach(menu => menu.classList.toggle('active', menu.dataset.navMenu === navState.activeRoot));
  document.getElementById('navSubPanel').classList.toggle('hidden', !navState.activeRoot);
}
function collapseAuthPackNav() { setActiveAuthPackNavRoot(''); }
function jumpToSection(id) {
  document.getElementById(id).scrollIntoView({behavior: 'smooth', block: 'start'});
  collapseAuthPackNav();
}
SraAuditTools.bindProgressiveNav({
  nav: document.getElementById('authPackNav'),
  getActiveRoot: () => navState.activeRoot,
  setActiveRoot: setActiveAuthPackNavRoot,
  collapse: collapseAuthPackNav,
});
document.addEventListener('click', (ev) => { if (!document.getElementById('authPackNav').contains(ev.target)) collapseAuthPackNav(); });
document.addEventListener('keydown', (ev) => { if (ev.key === 'Escape') collapseAuthPackNav(); });
function formatApiError(data, fallback='') {
  const detail = data && (data.detail || data.message || data.error);
  if (Array.isArray(detail)) return detail.map(item => item.msg || JSON.stringify(item)).join('\n');
  if (detail && typeof detail === 'object') return JSON.stringify(detail, null, 2);
  return String(detail || fallback || '請求失敗');
}
async function api(path, opts = {}) {
  const headers = Object.assign({'Content-Type': 'application/json'}, opts.headers || {});
  const token = localStorage.getItem(tokenKey);
  if (token) headers.Authorization = 'Bearer ' + token;
  const res = await fetch(path, Object.assign({}, opts, {headers}));
  const text = await res.text();
  let data = {}; try { data = text ? JSON.parse(text) : {}; } catch { data = {detail: text}; }
  if (!res.ok) throw new Error(formatApiError(data, res.statusText));
  return data;
}
function payload() {
  return {
    username: document.getElementById('username').value,
    password: document.getElementById('password').value,
    full_name: document.getElementById('fullName').value,
    department: document.getElementById('department').value,
    note: document.getElementById('note').value,
  };
}
async function login() {
  try {
    const data = await api('/v1/auth/login', {method: 'POST', body: JSON.stringify(payload())});
    localStorage.setItem(tokenKey, data.access_token);
    out(data);
  } catch (err) { out(String(err.message || err)); }
}
async function registerUser() {
  try { out(await api('/v1/auth/register', {method: 'POST', body: JSON.stringify(payload())})); }
  catch (err) { out(String(err.message || err)); }
}
async function me() {
  try { out(await api('/v1/auth/me')); }
  catch (err) { out(String(err.message || err)); }
}
async function logout() {
  try { out(await api('/v1/auth/logout', {method: 'POST'})); }
  catch (err) { out(String(err.message || err)); }
  finally { localStorage.removeItem(tokenKey); }
}
async function changePassword() {
  try {
    out(await api('/v1/auth/change-password', {method: 'POST', body: JSON.stringify({
      current_password: document.getElementById('currentPassword').value,
      new_password: document.getElementById('newPassword').value,
    })}));
  } catch (err) { out(String(err.message || err)); }
}
async function forgotPassword() {
  try { out(await api('/v1/auth/forgot-password', {method: 'POST', body: JSON.stringify({username: document.getElementById('username').value})})); }
  catch (err) { out(String(err.message || err)); }
}
async function recoverPassword() {
  try {
    out(await api('/v1/auth/reset-password', {method: 'POST', body: JSON.stringify({
      username: document.getElementById('username').value,
      reset_token: document.getElementById('resetToken').value,
      new_password: document.getElementById('newPassword').value,
    })}));
  } catch (err) { out(String(err.message || err)); }
}
function tsValue(row) {
  const value = row && row.ts ? Date.parse(row.ts) : NaN;
  return Number.isNaN(value) ? 0 : value;
}
function localPaginateRows(rows, page, pageSize) {
  const allRows = Array.isArray(rows) ? rows : [];
  const size = Math.max(1, Number(pageSize || 25));
  const total = allRows.length;
  const totalPages = Math.max(1, Math.ceil(total / size));
  const currentPage = Math.min(Math.max(1, Number(page || 1)), totalPages);
  const startIndex = (currentPage - 1) * size;
  return {
    rows: allRows.slice(startIndex, startIndex + size),
    page: currentPage,
    pageSize: size,
    total,
    totalPages,
    start: total ? startIndex + 1 : 0,
    end: Math.min(total, startIndex + size),
  };
}
function paginateAuditRows(rows, page, pageSize) {
  const sharedPaginator = window.SraAuditTools && window.SraAuditTools.paginateRows;
  return typeof sharedPaginator === 'function' ? sharedPaginator(rows, page, pageSize) : localPaginateRows(rows, page, pageSize);
}
function pagerElementId(prevId, suffix) {
  const base = String(prevId || '').replace(/PrevBtn$/, '');
  return base ? `${base}${suffix}` : '';
}
function updatePager(rows, page, infoId, prevId, nextId) {
  const pageData = paginateAuditRows(rows, page, 25);
  const first = document.getElementById(pagerElementId(prevId, 'FirstBtn'));
  const prev = document.getElementById(prevId);
  const next = document.getElementById(nextId);
  const last = document.getElementById(pagerElementId(prevId, 'LastBtn'));
  const input = document.getElementById(pagerElementId(prevId, 'PageInput'));
  document.getElementById(infoId).textContent = `第 ${pageData.page} / ${pageData.totalPages} 頁，顯示 ${pageData.start}-${pageData.end} 筆，共 ${pageData.total} 筆`;
  if (first) first.disabled = pageData.page <= 1;
  if (prev) prev.disabled = pageData.page <= 1;
  if (next) next.disabled = pageData.page >= pageData.totalPages;
  if (last) last.disabled = pageData.page >= pageData.totalPages;
  if (input) {
    input.value = String(pageData.page);
    input.max = String(pageData.totalPages);
  }
  return pageData;
}
function bindPagerActions(prefix, getPage, setPage, renderPage) {
  const jumpTo = (page) => { setPage(page); renderPage(); };
  document.getElementById(`${prefix}FirstBtn`).onclick = () => jumpTo(1);
  document.getElementById(`${prefix}PrevBtn`).onclick = () => jumpTo(getPage() - 1);
  document.getElementById(`${prefix}NextBtn`).onclick = () => jumpTo(getPage() + 1);
  document.getElementById(`${prefix}LastBtn`).onclick = () => jumpTo(Number.MAX_SAFE_INTEGER);
  document.getElementById(`${prefix}GotoBtn`).onclick = () => jumpTo(Number(document.getElementById(`${prefix}PageInput`).value || 1));
  document.getElementById(`${prefix}PageInput`).onkeydown = (ev) => { if (ev.key === 'Enter') jumpTo(Number(ev.currentTarget.value || 1)); };
}
function renderLoginAuditPage() {
  const page = updatePager(pageState.loginAuditRows, pageState.loginAuditPage, 'loginAuditPageInfo', 'loginAuditPrevBtn', 'loginAuditNextBtn');
  pageState.loginAuditPage = page.page;
  document.getElementById('loginAuditHits').innerHTML = page.rows.map(ev => `<div class="audit"><strong>${esc(ev.username || '-')}</strong><div class="muted">${esc(ev.ts || '')} success=${esc(ev.success)} reason=${esc(ev.reason || '-')} role=${esc(ev.role || '-')} status=${esc(ev.status || '-')}</div><div class="muted">client=${esc(ev.client_host || '-')} user_agent=${esc(ev.user_agent || '-')}</div></div>`).join('') || '<p class="muted">尚無登入稽核紀錄。</p>';
}
async function loginAudit() {
  try {
    const data = await api('/v1/auth/login-audit');
    pageState.loginAuditRows = (data.events || []).slice().sort((a, b) => tsValue(b) - tsValue(a));
    pageState.loginAuditPage = 1;
    renderLoginAuditPage();
    out(data);
  }
  catch (err) { out(String(err.message || err)); }
}
async function loadAccountStats() {
  try {
    const params = new URLSearchParams({category: 'account', chart_bucket: document.getElementById('accountStatsBucket').value});
    const username = document.getElementById('accountStatsUsername').value.trim();
    const action = document.getElementById('accountStatsAction').value.trim();
    if (username) params.set('username', username);
    if (action) params.set('action', action);
    const data = await api('/v1/editor/usage-stats?' + params.toString());
    const stats = data.filtered?.stats || {};
    SraAuditTools.renderSummaryCards(document.getElementById('accountStatsCards'), [
      {label: '帳號操作數', value: stats.total_events || 0, hint: data.filtered?.is_restricted_to_self ? '限定自己' : '目前篩選'},
      {label: '動作種類', value: Object.keys(stats.by_action || {}).length, hint: 'auth.*'},
      {label: '使用者數', value: Object.keys(stats.by_user || {}).length, hint: '依目前篩選'},
    ]);
    SraAuditTools.renderTimeSeriesChart({
      rows: data.filtered?.series || [],
      bucket: data.filtered?.chart_bucket || document.getElementById('accountStatsBucket').value,
      bucketLabel: data.filtered?.chart_bucket_label || '每日',
      titleEl: document.getElementById('accountStatsTitle'),
      summaryEl: document.getElementById('accountStatsSummary'),
      chartEl: document.getElementById('accountStatsChart'),
      seriesName: '帳號操作筆數',
    });
    out(data.filtered || data);
  } catch (err) { out(String(err.message || err)); }
}
function roleOptionsHtml(selectedRole, roleOptions) {
  const options = roleOptions && roleOptions.length ? roleOptions : [
    {value: 'superuser', label: '最高級全能者'},
    {value: 'db_operator', label: '資料庫操作者'},
    {value: 'data_editor', label: '資料修改者'},
    {value: 'data_reader', label: '資料閱讀者'},
  ];
  return options.map(opt => `<option value="${esc(opt.value)}" ${opt.value === selectedRole ? 'selected' : ''}>${esc(opt.label)} (${esc(opt.value)})</option>`).join('');
}
async function refreshUsers() {
  try {
    const data = await api('/v1/auth/users');
    const roleOptions = data.role_options || [];
    pageState.usersRows = (data.users || []).slice().sort((a, b) => String(a.username || '').localeCompare(String(b.username || '')));
    pageState.usersRoleOptions = roleOptions;
    pageState.usersPage = 1;
    renderUsersPage();
    out(data);
  } catch (err) { out(String(err.message || err)); }
}
function renderUsersPage() {
  const roleOptions = pageState.usersRoleOptions || [];
  const page = updatePager(pageState.usersRows, pageState.usersPage, 'usersPageInfo', 'usersPrevBtn', 'usersNextBtn');
  pageState.usersPage = page.page;
  document.getElementById('users').innerHTML = page.rows.map(u => `<div class="user"><strong>${esc(u.username)}</strong> status=${esc(u.status)} role=${esc(u.role)} <select data-role-select="${esc(u.username)}">${roleOptionsHtml(u.role, roleOptions)}</select> <button onclick="approveSelectedUser('${esc(u.username)}')">核准 / 更新層級</button><button class="secondary" onclick="issuePasswordResetToken('${esc(u.username)}')">產生 reset token</button><button class="danger" title="pending 帳號會被拒絕申請；active 帳號會被停權並讓既有 token 失效。" onclick="rejectUser('${esc(u.username)}')">拒絕申請／停權</button><button class="danger" onclick="resetUserPassword('${esc(u.username)}')">直接重設密碼</button><button class="danger" onclick="deleteUser('${esc(u.username)}')">刪除</button></div>`).join('') || '<p class="muted">尚無帳號。</p>';
}
async function approveSelectedUser(username) {
  const select = Array.from(document.querySelectorAll('[data-role-select]')).find(el => el.dataset.roleSelect === username);
  await approveUser(username, select ? select.value : 'data_reader');
}
async function approveUser(username, role) { out(await api(`/v1/auth/users/${encodeURIComponent(username)}/approve`, {method: 'POST', body: JSON.stringify({role})})); await refreshUsers(); }
async function rejectUser(username) { out(await api(`/v1/auth/users/${encodeURIComponent(username)}/reject`, {method: 'POST'})); await refreshUsers(); }
async function copyTextToClipboard(text) {
  if (navigator.clipboard && window.isSecureContext) {
    await navigator.clipboard.writeText(text);
    return;
  }
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  const ok = document.execCommand('copy');
  ta.remove();
  if (!ok) throw new Error('瀏覽器不允許自動複製，請手動選取文字複製。');
}
function showResetTokenDialog(username, token) {
  document.getElementById('resetTokenModalHelp').textContent = `請用安全管道交付給 ${username}。token 只會顯示這一次，請直接複製保存。`;
  document.getElementById('resetTokenModalValue').value = token || '';
  document.getElementById('resetTokenCopyStatus').textContent = '';
  document.getElementById('resetTokenModal').classList.remove('hidden');
  document.getElementById('resetTokenModalValue').focus();
  document.getElementById('resetTokenModalValue').select();
}
function closeResetTokenDialog() { document.getElementById('resetTokenModal').classList.add('hidden'); }
async function issuePasswordResetToken(username) {
  const data = await api(`/v1/auth/users/${encodeURIComponent(username)}/password-reset-token`, {method: 'POST'});
  out(data);
  showResetTokenDialog(username, data.reset_token);
}
async function resetUserPassword(username) {
  const new_password = prompt(`請輸入 ${username} 的新密碼（至少 8 字元）`);
  if (!new_password) return;
  out(await api(`/v1/auth/users/${encodeURIComponent(username)}/reset-password`, {method: 'POST', body: JSON.stringify({new_password})}));
  await refreshUsers();
}
async function deleteUser(username) { out(await api(`/v1/auth/users/${encodeURIComponent(username)}`, {method: 'DELETE'})); await refreshUsers(); }
bindPagerActions('users', () => pageState.usersPage, (page) => { pageState.usersPage = page; }, renderUsersPage);
bindPagerActions('loginAudit', () => pageState.loginAuditPage, (page) => { pageState.loginAuditPage = page; }, renderLoginAuditPage);
document.getElementById('copyResetTokenBtn').onclick = async () => {
  try {
    await copyTextToClipboard(document.getElementById('resetTokenModalValue').value);
    document.getElementById('resetTokenCopyStatus').textContent = '已複製 token。';
  } catch (err) {
    document.getElementById('resetTokenCopyStatus').textContent = String(err.message || err);
  }
};
document.getElementById('closeResetTokenModalBtn').onclick = closeResetTokenDialog;
document.getElementById('resetTokenModal').onclick = (ev) => { if (ev.target === document.getElementById('resetTokenModal')) closeResetTokenDialog(); };
</script>
</body>
