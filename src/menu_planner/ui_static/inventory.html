<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Menu Planner - 庫存統整</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <script src="/vendor/jquery-3.7.1.min.js"></script>
</head>
<body>
  <nav class="top-nav" aria-label="主要導覽">
    <div class="top-nav-inner">
      <a class="brand" href="/">Menu Planner</a>
      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="primary-nav-links">☰ 選單</button>
      <div id="primary-nav-links" class="nav-links">
        <a href="/">排菜總覽</a>
        <a href="/admin">資料庫管理</a>
        <a href="/inventory.html">庫存統整</a>
        <a href="/account.html">帳號管理</a>
      </div>
    </div>
  </nav>

  <div class="wrap">
    <header class="hdr">
      <h1>庫存統整</h1>
      <div class="sub">列出所有食材庫存，並可快速回到食材管理或排菜頁。</div>
    </header>

    <div id="js_error_banner" class="js-error-banner" role="alert" aria-live="assertive" hidden></div>

    <section class="card">
      <div class="inventory-topbar">
        <a class="btn-link" href="/">回到排菜</a>
        <a class="btn-link" href="/admin">回到食材管理</a>
      </div>

      <div class="row">
        <label>搜尋</label>
        <input id="inv_q" type="text" placeholder="輸入食材名稱或 ID" />
      </div>
      <div class="row">
        <label>篩選</label>
        <div class="chips">
          <label><input id="inv_only_stock" type="checkbox" /> 只看有庫存（qty &gt; 0）</label>
        </div>
      </div>
      <div class="btns">
        <button id="inv_refresh" class="primary">重新整理</button>
        <button id="inv_export_excel">匯出 Excel</button>
      </div>
      <div id="inv_msg" class="msg"></div>
      <div class="inventory-pager">
        <div id="inv_pager_meta" class="muted">第 1 / 1 頁，共 0 筆</div>
        <div class="inventory-pager-controls">
          <label for="inv_page_size">每頁</label>
          <select id="inv_page_size">
            <option value="10">10</option>
            <option value="20" selected>20</option>
            <option value="50">50</option>
            <option value="100">100</option>
          </select>
          <button id="inv_page_prev" type="button">上一頁</button>
          <button id="inv_page_next" type="button">下一頁</button>
          <input id="inv_page_jump" type="number" min="1" style="width:90px;" placeholder="頁碼" />
          <button id="inv_jump_btn" type="button">跳頁</button>
        </div>
      </div>

      <div class="tbl-scroll" style="margin-top:8px;">
        <table class="tbl" id="inv_tbl">
          <thead>
            <tr>
              <th class="sortable-th" data-inv-sort-key="ingredient_id">食材 ID</th>
              <th class="sortable-th" data-inv-sort-key="ingredient_name">名稱</th>
              <th class="sortable-th" data-inv-sort-key="category">分類</th>
              <th class="sortable-th" data-inv-sort-key="qty_on_hand">庫存量</th>
              <th class="sortable-th" data-inv-sort-key="inventory_unit">庫存單位</th>
              <th class="sortable-th" data-inv-sort-key="updated_at">更新日</th>
              <th class="sortable-th" data-inv-sort-key="expiry_date">到期日</th>
              <th class="sortable-th" data-inv-sort-key="dish_ref_count">引用菜色數</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="error_reporter.js"></script>
  <script type="module" src="inventory.js"></script>
  <script src="nav.js"></script>
</body>
</html>
